name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run critical tests
        run: |
          python3 scripts/check_hardcoded_paths.py
          pytest -q -c /dev/null tests/test_decision_loop.py tests/test_workflow_state_machine.py tests/test_workflow_threads.py
          pytest -q -c /dev/null tests/test_comms_agent.py tests/test_conversation_engine.py tests/test_memory_manager.py tests/test_vito_core.py

      - name: Smoke import boot
        run: |
          python3 - <<'PY'
          import os
          os.environ.setdefault("VITO_ALLOW_MULTI", "1")
          os.environ.setdefault("TELEGRAM_OWNER_CHAT_ID", "1")
          os.environ.setdefault("TELEGRAM_BOT_TOKEN", "test-token")
          from main import VITO
          print("VITO import smoke ok")
          _ = VITO()
          print("VITO init smoke ok")
          PY
